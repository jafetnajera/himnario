<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #f0f0f0;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 0;
}

.app {
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: #0f0f0f;
  border-bottom: 0.5px solid #1e1e1e;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  width: 36px; height: 36px;
  background: #1a1828;
  border-radius: 8px;
  border: 0.5px solid #3c3489;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.title-group { flex: 1; min-width: 0; }
.title-group h1 { font-size: 18px; font-weight: 500; color: #f0f0f0; line-height: 1; }
.badge {
  display: inline-block; padding: 1px 8px;
  background: #1e1e2e; border: 0.5px solid #534ab7;
  border-radius: 20px; font-size: 11px; color: #afa9ec;
  margin-left: 8px; font-weight: 400; vertical-align: middle;
}

.cast-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  background: #1a1828;
  border: 0.5px solid #3c3489;
  border-radius: 8px;
  color: #afa9ec;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.cast-btn:hover, .cast-btn:active { background: #231f40; border-color: #7f77dd; }
.cast-btn svg { flex-shrink: 0; }

/* MAIN LAYOUT */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 20px;
  max-width: 100%;
}

/* LANDSCAPE: two-column layout */
@media (orientation: landscape) and (min-width: 700px) {
  .app { flex-direction: column; }
  .main {
    flex-direction: row;
    align-items: flex-start;
    gap: 20px;
    padding: 16px 24px;
  }
  .search-col {
    width: 300px;
    flex-shrink: 0;
    position: sticky;
    top: 70px;
  }
  .results-col {
    flex: 1;
    min-width: 0;
  }
  .stats { margin-top: 0; }
}

.search-col { display: flex; flex-direction: column; gap: 8px; }
.results-col { flex: 1; }

.search-bar { position: relative; }
.search-bar input {
  width: 100%;
  background: #111;
  border: 0.5px solid #2a2a2a;
  border-radius: 12px;
  padding: 13px 42px 13px 44px;
  font-size: 15px;
  color: #f0f0f0;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}
.search-bar input:focus { border-color: #534ab7; }
.search-bar input::placeholder { color: #3a3a3a; }
.search-icon {
  position: absolute; left: 15px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px; color: #444;
  pointer-events: none;
}
.clear-btn {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; color: #555;
  cursor: pointer; font-size: 20px; line-height: 1;
  display: none; padding: 2px 6px;
}
.clear-btn:hover { color: #999; }

.stats { font-size: 12px; color: #444; padding-left: 2px; }

.results { display: flex; flex-direction: column; gap: 3px; }

.result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 13px;
  border-radius: 10px;
  border: 0.5px solid transparent;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-decoration: none; color: inherit;
}
.result-item:hover { background: #15132a; border-color: #3c3489; }
.result-item:active { background: #1e1a3a; }

.slide-icon {
  flex-shrink: 0; width: 34px; height: 34px;
  background: #1a1828; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  border: 0.5px solid #2a2a3a;
}
.result-name {
  flex: 1; font-size: 14px; color: #cccccc;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-name mark {
  background: #3c3489; color: #cecbf6;
  border-radius: 3px; padding: 0 2px;
}
.open-icon { width: 14px; height: 14px; color: #333; flex-shrink: 0; transition: color 0.15s; }
.result-item:hover .open-icon, .result-item:active .open-icon { color: #7f77dd; }

.empty-state { text-align: center; padding: 3rem 0; color: #444; font-size: 14px; }
</style>

function isMobile() {
  return /Android|iPad|iPhone|iPod|tablet/i.test(navigator.userAgent) ||
    (navigator.maxTouchPoints > 1 && /Macintosh/i.test(navigator.userAgent));
}

function buildUrl(item) {
  if (!item.id) return '#';
  return 'https://docs.google.com/presentation/d/' + item.id + '/present';
}

function highlight(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return text.slice(0,i) + '<mark>' + text.slice(i, i+q.length) + '</mark>' + text.slice(i+q.length);
}

function openPresentation(url) {
  if (isMobile()) {
    window.location.href = url;
  } else {
    const w = 1200, h = 720;
    const left = Math.round((screen.width - w) / 2);
    const top = Math.round((screen.height - h) / 2);
    const popup = window.open(url, 'himno_popup',
      'width='+w+',height='+h+',left='+left+',top='+top+',toolbar=no,menubar=no,scrollbars=no,resizable=yes');
    if (popup) popup.focus();
    else window.open(url, '_blank');
  }
}

function render(query) {
  const q = query.trim().toLowerCase();
  const filtered = q ? DATA.filter(p => p.name.toLowerCase().includes(q)) : DATA;
  document.getElementById('stats').textContent = q
    ? filtered.length + ' resultado' + (filtered.length !== 1 ? 's' : '') + ' de ' + DATA.length
    : DATA.length + ' himnos disponibles';
  if (filtered.length === 0) {
    document.getElementById('results').innerHTML = '<div class="empty-state">Sin resultados para "' + query + '"</div>';
    return;
  }
  document.getElementById('results').innerHTML = filtered.map(p => {
    const url = buildUrl(p);
    return '<a class="result-item" href="' + url + '" onclick="handleClick(event,this)">' +
      '<div class="slide-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7f77dd" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>' +
      '<span class="result-name">' + highlight(p.name, query) + '</span>' +
      '<svg class="open-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>' +
      '</a>';
  }).join('');
}

function handleClick(e, el) {
  e.preventDefault();
  openPresentation(el.href);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

document.getElementById('count-tag').textContent = DATA.length + ' himnos';

const searchInput = document.getElementById('search-input');
const clearBtn = document.getElementById('clear-btn');
searchInput.addEventListener('input', e => {
  clearBtn.style.display = e.target.value ? 'block' : 'none';
  render(e.target.value);
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  render('');
  searchInput.focus();
});

render('');
if (!isMobile()) searchInput.focus();
</script>
